name: Refresh Season Data

on:
  # Runs nightly at 8am UTC (1am Pacific) during baseball season
  schedule:
    - cron: '0 8 * * *'
  # Also lets you trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Refresh current season
        run: node ingest.js --current
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
