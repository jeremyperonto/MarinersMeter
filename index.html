function isSeasonComplete(year) {
  const now = new Date();
  return year < now.getFullYear() || (year === now.getFullYear() && now.getMonth() >= 10);
}

async function getDefaultYear() {
  const now = new Date().getFullYear();
  try {
    const r = await fetch(`${API}/schedule?sportId=1&season=${now}&teamId=${SEA_ID}&gameType=R&startDate=${now}-01-01&endDate=${now}-12-31`);
    const d = await r.json();
    if (d.totalGames > 0) return now;
  } catch {}
  return now - 1;
}

function getTodayCursorIdx(tl) {
  if (!tl.length) return 0;
  const today = TODAY();
  let best = 0;
  for (let i = 0; i < tl.length; i++) {
    if (tl[i].date <= today) best = i; else break;
  }
  return best;
}

function fmtGameTime(isoStr) {
  if (!isoStr) return "";
  return new Date(isoStr).toLocaleTimeString("en-US", {
    hour: "numeric", minute: "2-digit", timeZone: TZ, timeZoneName: "short",
  });
}

function fmtDate(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

async function getTeamGames(teamId, year) {
  if (isSeasonComplete(year)) {
    const { data, error } = await sb.from("games").select("*")
      .eq("season", year).eq("team_id", teamId).eq("game_type", "R")
      .order("game_date");
    if (error) throw new Error(error.message);
    return data.map(g => ({
      date: g.game_date, wins: g.wins, losses: g.losses,
      result: g.result, score: g.score, oppScore: g.opp_score, opp: g.opp_abbr,
    }));
  }
  const r = await fetch(`${API}/schedule?sportId=1&season=${year}&teamId=${teamId}&gameType=R`);
  const d = await r.json();
  return (d.dates ?? []).flatMap(({ games }) =>
    games.filter(g => g.status.abstractGameState === "Final").map(g => {
      const mine = g.teams.home.team.id === teamId ? g.teams.home : g.teams.away;
      const them = g.teams.home.team.id === teamId ? g.teams.away : g.teams.home;
      if (!mine.leagueRecord) return null;
      return {
        date: g.officialDate,
        wins: mine.leagueRecord.wins, losses: mine.leagueRecord.losses,
        result: mine.isWinner ? "W" : "L",
        score: mine.score, oppScore: them.score, opp: them.team.name,
      };
    }).filter(Boolean)
  ).sort((a, b) => a.date.localeCompare(b.date));
}

async function getSeaFullSchedule(year) {
  if (isSeasonComplete(year)) {
    const { data, error } = await sb.from("games").select("*")
      .eq("season", year).eq("team_id", SEA_ID).order("game_date");
    if (error) throw new Error(error.message);
    const byDate = {};
    const playoffDates = [];
    data.forEach(g => {
      const isPost = g.game_type !== "R";
      byDate[g.game_date] = {
        date: g.game_date, pk: g.game_pk, isHome: g.is_home,
        oppName: g.opp_abbr, oppAbbr: g.opp_abbr,
        seaScore: g.score, oppScore: g.opp_score,
        state: "Final", gameTime: null, isPostseason: isPost,
        gameType: g.game_type, roundLabel: ROUND_NAMES[g.game_type] ?? null,
      };
      if (isPost && !playoffDates.includes(g.game_date)) playoffDates.push(g.game_date);
    });
    return { byDate, next: null, playoffDates: playoffDates.sort() };
  }

  // Current season — fetch from MLB API
  const [regR, poR] = await Promise.all([
    fetch(`${API}/schedule?sportId=1&season=${year}&teamId=${SEA_ID}&gameType=R`),
    fetch(`${API}/schedule?sportId=1&season=${year}&teamId=${SEA_ID}&gameType=F,D,L,W`),
  ]);
  const [regD, poD] = await Promise.all([regR.json(), poR.json()]);

  function parseGames(apiDates, isPostseason) {
    return (apiDates ?? []).flatMap(({ games }) =>
      games.map(g => {
        const isHome  = g.teams.home.team.id === SEA_ID;
        const seaSide = isHome ? g.teams.home : g.teams.away;
        const oppSide = isHome ? g.teams.away : g.teams.home;
        return {
          date:        g.officialDate,
          pk:          g.gamePk,
          isHome,
          oppName:     oppSide.team.name,
          oppAbbr:     oppSide.team.abbreviation,
          seaScore:    seaSide.score,
          oppScore:    oppSide.score,
          state:       g.status.abstractGameState,
          gameTime:    g.gameDate,
          isPostseason,
          gameType:    g.gameType,
          roundLabel:  ROUND_NAMES[g.gameType] ?? null,
        };
      })
    ).sort((a, b) => a.date.localeCompare(b.date));
  }

  const regGames = parseGames(regD.dates, false);
  const poGames  = parseGames(poD.dates, true);
  const allGames = [...regGames, ...poGames].sort((a, b) => a.date.localeCompare(b.date));

  const byDate = {};
  allGames.forEach(g => { byDate[g.date] = g; });

  const today = TODAY();
  const next  = regGames.find(g => g.date >= today && g.state === "Preview") ?? null;
  const playoffDates = poGames.map(g => g.date).filter((d, i, a) => a.indexOf(d) === i).sort();
  return { byDate, next, playoffDates };
}

async function getPlayoffGames(teamId, year) {
  try {
    let games;
    if (isSeasonComplete(year)) {
      const { data, error } = await sb.from("games").select("*")
        .eq("season", year).eq("team_id", teamId).neq("game_type", "R")
        .order("game_date");
      if (error) throw new Error(error.message);
      games = (data ?? []).map(g => ({
        date: g.game_date, gameType: g.game_type, result: g.result,
        score: g.score, oppScore: g.opp_score, opp: g.opp_abbr,
      }));
    } else {
      const r = await fetch(`${API}/schedule?sportId=1&season=${year}&teamId=${teamId}&gameType=F,D,L,W`);
      const d = await r.json();
      games = (d.dates ?? []).flatMap(({ games }) =>
        games.filter(g => g.status.abstractGameState === "Final").map(g => {
          const mine = g.teams.home.team.id === teamId ? g.teams.home : g.teams.away;
          const them = g.teams.home.team.id === teamId ? g.teams.away : g.teams.home;
          return { date: g.officialDate, gameType: g.gameType, result: mine.isWinner ? "W" : "L", score: mine.score, oppScore: them.score, opp: them.team.name };
        })
      ).sort((a, b) => a.date.localeCompare(b.date));
    }
    if (!games.length) return [];
    const map = {};
    games.forEach(g => {
      if (!map[g.gameType]) map[g.gameType] = { gameType: g.gameType, round: ROUND_NAMES[g.gameType], games: [], opp: g.opp };
      map[g.gameType].games.push(g);
    });
    return Object.values(map)
      .sort((a, b) => (ROUND_ORDER[a.gameType] ?? 9) - (ROUND_ORDER[b.gameType] ?? 9))
      .map(s => ({ ...s, wins: s.games.filter(g => g.result === "W").length, losses: s.games.filter(g => g.result === "L").length, advanced: s.games.at(-1)?.result === "W", eliminated: s.games.at(-1)?.result === "L" }));
  } catch { return []; }
}

function buildTimeline(gamesByTeam) {
  const ids   = Object.keys(gamesByTeam).map(Number);
  const dates = [...new Set(Object.values(gamesByTeam).flat().map(g => g.date))].sort();
  const rec   = Object.fromEntries(ids.map(id => [id, { w: 0, l: 0, last: null }]));
  const tl    = [];
  for (const date of dates) {
    let hit = false;
    ids.forEach(id => {
      const gs = gamesByTeam[id]?.filter(g => g.date === date);
      if (gs?.length) { const g = gs.at(-1); rec[id] = { w: g.wins, l: g.losses, last: g.result }; hit = true; }
    });
    if (!hit) continue;
    let lW = 0, lL = 999;
    ids.forEach(id => { if (rec[id].w > lW || (rec[id].w === lW && rec[id].l < lL)) { lW = rec[id].w; lL = rec[id].l; } });
    const standings = Object.fromEntries(ids.map(id => {
      const { w, l, last } = rec[id];
      return [id, { w, l, last, gb: Math.max(0, ((lW - w) + (l - lL)) / 2), pct: (w + l) > 0 ? w / (w + l) : 0 }];
    }));
    tl.push({ date, standings });
  }
  return tl;
}

function calcMood(sea, idx, total, recent, playoffRuns) {
  if (!sea || sea.w + sea.l < 5) return 0;
  const thru = idx / Math.max(1, total);
  let m = (sea.w / (sea.w + sea.l) - 0.5) * 180;
  m -= Math.min(sea.gb * (2 + thru * 8), 75);
  if (recent?.length) m += (recent.filter(r => r === "W").length / recent.length - 0.5) * 36;
  if (thru > 0.75 && sea.gb < 2)  m += 28;
  if (thru > 0.80 && sea.gb > 12) m -= 22;
  if (idx >= total - 1 && playoffRuns?.length) {
    const last = playoffRuns.at(-1);
    if (last.eliminated) { m -= ({ F: 20, D: 35, L: 55, W: 80 }[last.gameType] ?? 20); if (last.gameType === "L" && last.wins >= 2) m -= 15; }
    if (!last.eliminated) m = Math.min(100, m + 50);
  }
  return Math.max(-100, Math.min(100, m));
}

function smoothSvgPath(pts, t = 0.35) {
  if (!pts.length) return "";
  if (pts.length === 1) return `M${pts[0].x},${pts[0].y}`;
  let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)], p1 = pts[i], p2 = pts[i + 1], p3 = pts[Math.min(pts.length - 1, i + 2)];
    d += ` C${(p1.x + (p2.x - p0.x) * t).toFixed(1)},${(p1.y + (p2.y - p0.y) * t).toFixed(1)} ${(p2.x - (p3.x - p1.x) * t).toFixed(1)},${(p2.y - (p3.y - p1.y) * t).toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  return d;
}

// ── Chart ─────────────────────────────────────────────────────
function Chart({ timeline, teams, cursor, onCursor }) {
  const svgRef   = useRef(null);
  const dragging = useRef(false);
  const P = { t: 16, r: 18, b: 30, l: 58 };
  const W = 900, H = 240, iW = W - P.l - P.r, iH = H - P.t - P.b;

  const maxGB = useMemo(() => {
    let m = 5;
    timeline.forEach(d => Object.values(d.standings).forEach(s => { if (s.gb > m) m = s.gb; }));
    return Math.ceil(m / 5) * 5;
  }, [timeline]);

  const xs = useCallback(i  => P.l + (i / Math.max(1, timeline.length - 1)) * iW, [timeline.length, iW]);
  const ys = useCallback(gb => P.t + (gb / maxGB) * iH, [maxGB, iH]);

  const paths = useMemo(() => teams.map(t => ({
    ...t,
    d: smoothSvgPath(
      timeline.map((pt, i) => { const s = pt.standings[t.id]; return s ? { x: xs(i), y: ys(s.gb) } : null; }).filter(Boolean)
    ),
  })), [timeline, teams, xs, ys]);

  const monthTicks = useMemo(() => {
    const seen = new Set();
    return timeline.map((pt, i) => {
      const m = pt.date.slice(5, 7);
      if (seen.has(m)) return null;
      seen.add(m);
      return { i, label: ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m] };
    }).filter(Boolean);
  }, [timeline]);

  const getIdx = useCallback((cx) => {
    if (!svgRef.current) return 0;
    const rect = svgRef.current.getBoundingClientRect();
    const sx = ((cx - rect.left) / rect.width) * W;
    return Math.max(0, Math.min(timeline.length - 1, Math.round(((sx - P.l) / iW) * (timeline.length - 1))));
  }, [timeline.length, iW]);

  const onDown = e => { dragging.current = true; svgRef.current?.setPointerCapture(e.pointerId); onCursor(getIdx(e.clientX)); };
  const onMove = e => { if (dragging.current) onCursor(getIdx(e.clientX)); };
  const onUp   = () => { dragging.current = false; };

  const cursorX = xs(cursor);
  const seaGb   = timeline[cursor]?.standings[SEA_ID]?.gb ?? 0;
  const gbTicks = Array.from({ length: maxGB / 5 + 1 }, (_, i) => i * 5);

  return (
    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
      style={{ width: "100%", display: "block", cursor: "crosshair", userSelect: "none" }}
      onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}>
      <rect x={P.l} y={P.t} width={iW} height={ys(3) - P.t} fill="rgba(0,181,172,.035)" />
      {gbTicks.map(gb => (
        <g key={gb}>
          <line x1={P.l} y1={ys(gb)} x2={W - P.r} y2={ys(gb)}
            stroke={gb === 0 ? "rgba(0,181,172,.2)" : "rgba(255,255,255,.028)"} strokeWidth={gb === 0 ? 1.5 : 1} />
          <text x={P.l - 8} y={ys(gb) + 4} textAnchor="end"
            fill={gb === 0 ? "rgba(0,181,172,.55)" : "rgba(80,130,160,.4)"} fontSize={9.5} fontFamily="Barlow Condensed,sans-serif">{gb}</text>
        </g>
      ))}
      <text x={11} y={P.t + iH / 2} textAnchor="middle" fill="rgba(55,95,115,.45)" fontSize={8}
        fontFamily="Barlow Condensed,sans-serif" letterSpacing={1.5}
        transform={`rotate(-90, 11, ${P.t + iH / 2})`}>GAMES BACK</text>
      {monthTicks.map(({ i, label }) => (
        <text key={i} x={xs(i)} y={H - 4} textAnchor="middle"
          fill="rgba(75,115,145,.5)" fontSize={9} fontFamily="Barlow Condensed,sans-serif" letterSpacing={1}>{label}</text>
      ))}
      {paths.map(t => t.d && (
        <path key={t.id} d={t.d} fill="none" stroke={t.color}
          strokeWidth={t.sea ? 2.6 : 1.4} strokeOpacity={t.sea ? 1 : 0.44}
          strokeLinecap="round" strokeLinejoin="round" />
      ))}
      <circle cx={cursorX} cy={ys(seaGb)} r={5} fill="#00B5AC" stroke="#03101f" strokeWidth={2.5} />
      <line x1={cursorX} y1={P.t} x2={cursorX} y2={H - P.b}
        stroke="rgba(232,119,34,.5)" strokeWidth={1} strokeDasharray="4 3" />
    </svg>
  );
}

// ── Game Card ─────────────────────────────────────────────────
function GameCard({ game, nextGame, cursorDate, linescore }) {
  const today   = TODAY();
  const isToday = cursorDate === today;

  const isFinal   = game?.state === "Final";
  const isLive    = game?.state === "Live";
  const isPreview = game?.state === "Preview";
  const showScore = (isFinal || isLive) && game != null;

  let statusLabel = isToday ? "TODAY" : fmtDate(cursorDate);
  if (game) {
    if (isToday && isLive)                  statusLabel = null; // handled with JSX below
    else if (isToday && isFinal)            statusLabel = "FINAL · TODAY";
    else if (isToday && isPreview)          statusLabel = "TODAY";
    else if (isFinal && game.isPostseason)  statusLabel = `FINAL · ${game.roundLabel ?? "POSTSEASON"} · ${fmtDate(cursorDate)}`;
    else if (isFinal)                       statusLabel = `FINAL · ${fmtDate(cursorDate)}`;
    else                                    statusLabel = fmtDate(cursorDate);
  }

  const inn = game && isLive && linescore
    ? `${linescore.inningState ?? ""} ${linescore.currentInningOrdinal ?? ""}`.trim()
    : game && isPreview ? fmtGameTime(game.gameTime)
    : "";

  // Score values — fall back to placeholders so the block always takes up space
  const seaScore = showScore ? (game.seaScore ?? "—") : "—";
  const oppScore = showScore ? (game.oppScore ?? "—") : "—";
  const oppAbbr  = game?.oppAbbr || "OPP";

  return (
    <div className="game-card">
      <div className="game-left">
        <div className="game-status">{statusLabel === null ? <><span className="live-dot" />LIVE</> : statusLabel}</div>
        {game
          ? <div className="game-matchup">{game.isHome ? `vs ${game.oppName}` : `@ ${game.oppName}`}</div>
          : <div className="game-nogame">No game{isToday ? " today." : "."}</div>
        }
        {inn && <div className="game-sub">{inn}</div>}
        {!game && nextGame && (
          <div className="game-next">
            Next up: <b>{nextGame.isHome ? "vs" : "@"} {nextGame.oppName}</b>
            {" · "}{fmtDate(nextGame.date)}{" · "}{fmtGameTime(nextGame.gameTime)}
          </div>
        )}
        {game && isToday && nextGame && nextGame.date !== cursorDate && (
          <div className="game-next">
            Next: <b>{nextGame.isHome ? "vs" : "@"} {nextGame.oppName}</b>
            {" · "}{fmtDate(nextGame.date)}
          </div>
        )}
      </div>
      {/* Always render score block — visibility:hidden on no-score days keeps height stable */}
      <div className="game-score" style={{ visibility: showScore ? "visible" : "hidden" }}>
        <div className="sc-t">
          <div className="sc-abbr" style={{ color: "#00B5AC" }}>SEA</div>
          <div className="sc-num sea">{seaScore}</div>
        </div>
        <div className="sc-vs">·</div>
        <div className="sc-t">
          <div className="sc-abbr">{oppAbbr}</div>
          <div className="sc-num">{oppScore}</div>
        </div>
      </div>
    </div>
  );
}

// ── Mood Meter ────────────────────────────────────────────────

// ── Standings ─────────────────────────────────────────────────
function Standings({ sorted, date }) {
  const [y, m, d] = date.split("-").map(Number);
  const label = new Date(y, m - 1, d).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
  return (
    <div className="panel">
      <div className="plbl">AL West · {label}</div>
      {sorted.map((t, i) => (
        <div key={t.id} className={`srow${t.sea ? " sea-row" : ""}`}>
          <span className="srk">{i + 1}</span>
          <span className="sdot" style={{ background: t.color }} />
          <span className="sabb" style={{ color: t.sea ? t.color : "#c8dce8" }}>{t.abbr}</span>
          <span className="swl">{t.w}–{t.l}</span>
          <span className={`sgb${i === 0 ? " lead" : t.sea ? " seagb" : ""}`}>
            {i === 0 ? "—" : t.gb % 1 === 0 ? t.gb : t.gb.toFixed(1)}
          </span>
          <span className="spct">{t.pct.toFixed(3).replace(/^0/, "")}</span>
        </div>
      ))}
    </div>
  );
}

// ── Season Record ─────────────────────────────────────────────
function SeaBox({ sea, rank, recent }) {
  if (!sea) return null;
  const { w, l, gb, pct } = sea;
  const total = w + l;
  const proj  = total > 0 ? Math.round((w / total) * 162) : 81;
  const gbColor = gb === 0 ? "#00B5AC" : gb < 5 ? "#b8d0e8" : gb < 12 ? "#b88050" : "#b05050";
  const suffix  = (["", "st", "nd", "rd"])[rank] || "th";
  return (
    <div className="panel">
      <div className="plbl">Season Record</div>
      <div className="big-rec">{w}–{l}</div>
      <div className="meta-row">
        <div><div className="mb-lbl">Win Pct</div><div className="mb-val" style={{ color: "#7aa0b8" }}>{pct.toFixed(3).replace(/^0/, "")}</div></div>
        <div><div className="mb-lbl">{gb === 0 ? "Division" : "Games Back"}</div><div className="mb-val" style={{ color: gbColor }}>{gb === 0 ? "1st" : gb % 1 === 0 ? String(gb) : gb.toFixed(1)}</div></div>
        <div><div className="mb-lbl">Div Rank</div><div className="mb-val" style={{ color: rank === 1 ? "#00B5AC" : "#6a8090" }}>{rank}{suffix}</div></div>
        <div><div className="mb-lbl">Proj Wins</div><div className="mb-val" style={{ color: proj >= 90 ? "#6aaa80" : proj >= 81 ? "#8090a0" : "#a07060" }}>{proj}</div></div>
      </div>
      {recent.length > 0 && (
        <div>
          <div className="mb-lbl" style={{ marginTop: 10 }}>Last {recent.length}</div>
          <div className="streak">{recent.map((r, i) => <div key={i} className={`sg ${r === "W" ? "w" : "l"}`}>{r}</div>)}</div>
        </div>
      )}
    </div>
  );
}

// ── Playoff Panel ─────────────────────────────────────────────
function PlayoffPanel({ runs, year, madePlayoffs }) {
  if (!madePlayoffs && !runs.length) return <div className="missed-po">Did not qualify for the postseason.</div>;
  const champion = runs.length && !runs.at(-1).eliminated;
  return (
    <div className="po-wrap">
      <div className="po-hdr">
        <span className="po-title">Postseason · {year}</span>
        {champion && <span className="po-result champ">⭐ World Series Champions</span>}
      </div>
      <div className="po-body">
        {runs.map((s, i) => (
          <div key={i} className="po-series">
            <span className="po-round">{s.round}</span>
            <span className="po-opp">vs {s.opp}</span>
            <div className="po-games">{s.games.map((g, j) => <div key={j} className={`po-g ${g.result === "W" ? "w" : "l"}`}>{g.result}</div>)}</div>
            <span className={`po-result ${s.eliminated ? "lost" : s.advanced ? "won" : ""}`}>
              {s.eliminated ? `Lost ${s.wins}–${s.losses}` : s.advanced ? `Won ${s.wins}–${s.losses}` : `${s.wins}–${s.losses}`}
            </span>
          </div>
        ))}
      </div>
      {PLAYOFF_LORE[year] && <div className="po-lore">{PLAYOFF_LORE[year]}</div>}
    </div>
  );
}

function App() {
  const [year, setYear]            = useState(null);
  const [teams, setTeams]          = useState([]);
  const [timeline, setTl]          = useState([]);
  const [playoffRuns, setPoRuns]   = useState([]);
  const [madePlayoffs, setMadeP]   = useState(false);
  const [loading, setLoading]      = useState(false);
  const [error, setError]          = useState("");
  const [cursor, setCursor]        = useState(0);
  const [seaByDate, setSeaByDate]  = useState({});
  const [nextGame, setNextGame]    = useState(null);
  const [linescore, setLinescore]  = useState(null);
  const liveRef   = useRef(null);
  const preMsg    = useMemo(() => PRE_SEASON[Math.floor(Math.random() * PRE_SEASON.length)], []);
  const nowYear   = new Date().getFullYear();
  const yearOpts  = useMemo(() => Array.from({ length: nowYear - 1976 }, (_, i) => nowYear - i), []);

  useEffect(() => { getDefaultYear().then(y => setYear(y)); }, []);

  useEffect(() => {
    if (year === null) return;
    const divTeams = TEAMS_BY_YEAR(year);
    setTeams(divTeams);
    setTl([]); setPoRuns([]); setMadeP(false); setError("");
    setSeaByDate({}); setNextGame(null); setLinescore(null);
    setLoading(true);
    Promise.all([
      Promise.all(divTeams.map(t => getTeamGames(t.id, year).then(gs => [t.id, gs]))),
      getPlayoffGames(SEA_ID, year),
      getSeaFullSchedule(year),
    ]).then(([pairs, po, sched]) => {
      let tl = buildTimeline(Object.fromEntries(pairs));
      // Append one entry per playoff game date (standings frozen at regular season end)
      // so the cursor can scrub into the postseason and show those games in the card.
      if (tl.length && sched.playoffDates.length) {
        // Null out 'last' so playoff extension entries don't bleed into the Last 10 streak
        const frozenStandings = Object.fromEntries(
          Object.entries(tl.at(-1).standings).map(([id, s]) => [id, { ...s, last: null }])
        );
        sched.playoffDates.forEach(date => {
          if (!tl.find(e => e.date === date)) {
            tl = [...tl, { date, standings: frozenStandings, isPlayoff: true }];
          }
        });
      }      setTl(tl);
      setCursor(getTodayCursorIdx(tl));
      setPoRuns(po);
      setMadeP(po.length > 0);
      setSeaByDate(sched.byDate);
      setNextGame(sched.next);
    }).catch(e => setError("Unable to load season data — " + e.message))
      .finally(() => setLoading(false));
  }, [year]);

  const today      = TODAY();
  const cursorDate = timeline[cursor]?.date ?? today;
  const cursorGame = seaByDate[cursorDate] ?? null;
  const isLiveNow  = cursorDate === today && cursorGame?.state === "Live";

  useEffect(() => {
    clearInterval(liveRef.current);
    setLinescore(null);
    if (!isLiveNow || !cursorGame?.pk) return;
    const poll = () => getLinescore(cursorGame.pk).then(setLinescore).catch(() => {});
    poll();
    liveRef.current = setInterval(poll, 20000);
    return () => clearInterval(liveRef.current);
  }, [isLiveNow, cursorGame?.pk]);

  const pt    = timeline[cursor];
  const sea   = pt?.standings[SEA_ID];
  const atEnd = cursor >= timeline.length - 1;

  const recent = useMemo(() =>
    timeline.slice(Math.max(0, cursor - 10), cursor).map(p => p.standings[SEA_ID]?.last).filter(Boolean),
    [timeline, cursor]);

  const mood = useMemo(() =>
    calcMood(sea, cursor, timeline.length, recent, atEnd ? playoffRuns : []),
    [sea, cursor, timeline.length, recent, atEnd, playoffRuns]);

  const zone = MOODS.find(z => mood <= z.t) ?? MOODS.at(-1);

  const sorted = useMemo(() =>
    !pt ? [] :
    teams.map(t => ({ ...t, ...(pt.standings[t.id] ?? { w: 0, l: 0, gb: 0, pct: 0 }) }))
      .sort((a, b) => a.gb - b.gb || b.w - a.w),
    [pt, teams]);

  const seaRank = sorted.findIndex(t => t.id === SEA_ID) + 1;

  if (year === null) return <div className="root"><style>{CSS}</style></div>;

  return (
    <div className="root">
      <style>{CSS}</style>
      <header className="hdr">
        <div>
          <div className="title">Mariners Meter</div>
          <div className="sub">American League West · What it feels like to root for Seattle</div>
        </div>
        <div className="yr-wrap">
          <span className="yr-lbl">Season</span>
          <select className="yr-sel" value={year} onChange={e => setYear(+e.target.value)}>
            {yearOpts.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
      </header>

      <div className="body">
        <GameCard game={cursorGame} nextGame={nextGame} cursorDate={cursorDate} linescore={linescore} />

        {LORE[year] && <div className="lore">"{LORE[year]}"</div>}
        {sea && <MoodMeter mood={mood} zone={zone} />}

        {/* Playoff panel — between feelings meter and the standings chart */}
        {playoffRuns.length > 0 && <PlayoffPanel runs={playoffRuns} year={year} madePlayoffs={madePlayoffs} />}

        <div className="sh">
          <span className="st">AL West Standings Race · {year}</span>
          <span className="shint">drag cursor to travel through the season</span>
        </div>
        <div className="legend">
          {teams.map(t => (
            <div key={t.id} className="leg" style={{ color: t.sea ? t.color : "#5a7a90" }}>
              <div className="ll" style={{ background: t.color, opacity: t.sea ? 1 : 0.55 }} />
              {t.abbr}
            </div>
          ))}
        </div>

        <div className="chart-wrap">
          {loading && (
            <div className="loader">
              <div className="ldots"><div className="ld"/><div className="ld"/><div className="ld"/></div>
              <div style={{ fontSize: 11, letterSpacing: 3, color: "#1a3040" }}>LOADING SEASON DATA</div>
            </div>
          )}
          {!loading && error && <div className="err" style={{ color: "#907060" }}>{error}</div>}
          {!loading && !error && timeline.length === 0 && (
            <div className="err" style={{ color: "#3a5a70", display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100px" }}>
              {year >= nowYear ? "There's always next year." : preMsg}
            </div>
          )}
          {!loading && !error && timeline.length > 0 && (
            <>
              <Chart timeline={timeline} teams={teams} cursor={cursor} onCursor={setCursor} />
              <div className="drag-hint">← drag to scrub through the {year} season →</div>
            </>
          )}
        </div>

        {pt && (
          <div className="info-row">
            <Standings sorted={sorted} date={pt.date} />
            <SeaBox sea={sea} rank={seaRank} recent={recent} />
          </div>
        )}
      </div>

      {/* JP badge — fixed top-right */}
      <a href="https://jeremyperonto.com" title="jeremyperonto.com"
        style={{position:"fixed",top:12,right:12,zIndex:9999,width:32,height:32,borderRadius:8,
          display:"grid",placeItems:"center",background:"rgba(255,255,255,.15)",
          backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",
          border:"1px solid rgba(255,255,255,.25)",color:"rgba(255,255,255,.7)",
          textDecoration:"none",fontFamily:"system-ui,sans-serif",fontWeight:700,
          fontSize:"0.65rem",lineHeight:1,paddingTop:1,transition:"background .2s,color .2s"}}
        onPointerEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.3)";e.currentTarget.style.color="rgba(255,255,255,.95)";}}
        onPointerLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.15)";e.currentTarget.style.color="rgba(255,255,255,.7)";}}>
        JP
      </a>

      <footer>
        <a href="https://jeremyperonto.com">jeremyperonto.com</a>
        &nbsp;·&nbsp;
        <a href="https://github.com/jeremyperonto/MarinersMeter">Build one for your team</a>
        &nbsp;·&nbsp;
        Data from <a href="https://www.retrosheet.org" target="_blank" rel="noopener">Retrosheet</a>
        &nbsp;and&nbsp;
        <a href="https://www.mlb.com" target="_blank" rel="noopener">MLB</a>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
